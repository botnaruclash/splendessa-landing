<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Splendessa — The Work · demo list prototype</title>
<style>
  :root {
    --paper: #FFFFFF;
    --ink: #17161A;
    --dim: #8A8A8E;        /* grey 1 — dimmed titles, 3.4:1 on white */
    --mist: #EFEDF0;       /* grey 2 — placeholder gradients */
    --rose: #B5536D;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { background: var(--paper); }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: var(--ink);
    background: var(--paper);
    -webkit-font-smoothing: antialiased;
  }

  .work {
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: clamp(5rem, 12vh, 8rem) 1.25rem;
  }

  .work-head {
    position: absolute;
    top: 2rem;
    left: 2rem;
  }

  .work-kicker {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--dim);
  }

  .work-intro {
    margin-top: 0.5rem;
    font-size: 0.9375rem;
    font-weight: 500;
    color: var(--ink);
  }

  .demo-list {
    list-style: none;
    text-align: center;
  }

  .demo-list li {
    line-height: 1.06;
    padding: 0.14em 0;
  }

  .demo-item {
    display: inline-block;
    font-size: clamp(1.9rem, 6.5vw, 4.8rem);
    font-weight: 700;
    letter-spacing: -0.025em;
    text-decoration: none;
    text-wrap: balance;
    color: var(--dim);
    transition: color 0.3s ease;
  }

  .demo-item:hover,
  .demo-item:focus-visible {
    color: var(--ink);
    transition-duration: 0.12s;
  }

  a.demo-item { cursor: pointer; }
  span.demo-item { cursor: default; }

  .demo-item:focus-visible {
    outline: 2px solid var(--ink);
    outline-offset: 6px;
    border-radius: 4px;
  }

  .preview {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 10;
    width: min(320px, 42vw);
    aspect-ratio: 16 / 10;
    border-radius: 14px;
    overflow: hidden;
    background: var(--paper);
    box-shadow: 0 18px 60px rgba(23, 22, 26, 0.16), 0 2px 10px rgba(23, 22, 26, 0.08);
    pointer-events: none;
    opacity: 0;
    visibility: hidden;
    will-change: transform;
  }

  .preview .face { position: absolute; inset: 0; }

  .face img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .ph { position: absolute; inset: 0; }

  .ph-label {
    position: absolute;
    left: 16px;
    bottom: 13px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink);
  }

  @media (prefers-reduced-motion: reduce) {
    .demo-item { transition: none; }
  }
</style>
</head>
<body>

<main class="work">
  <header class="work-head">
    <p class="work-kicker">The Standard</p>
    <p class="work-intro">Never the same twice.</p>
  </header>
  <ul class="demo-list" id="demoList"></ul>
</main>

<div class="preview" id="preview" aria-hidden="true">
  <div class="face"></div>
  <div class="face"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
<script>
  // ---- Config: the only thing you edit. -------------------------------
  // status "live"  → clickable, opens url in a new tab
  // status "soon"  → hover/preview only, no click
  // image null     → generated placeholder; set a path to use a real image
  const demos = [
    { name: "Velora",                 status: "live", url: "[URL-VELORA]", image: null },
    { name: "Lumina",                 status: "live", url: "[URL-LUMINA]", image: null },
    { name: "Maelis",                 status: "live", url: "[URL-MAELIS]", image: null },
    { name: "Dawn",                   status: "soon", url: null, image: null },
    { name: "Muse",                   status: "soon", url: null, image: null },
    { name: "Ember",                  status: "soon", url: null, image: null },
    { name: "Golden Hour",            status: "soon", url: null, image: null },
    { name: "Bare Beauty",            status: "soon", url: null, image: null },
    { name: "Where Time Softens",     status: "soon", url: null, image: null },
    { name: "The Face You Wake With", status: "soon", url: null, image: null },
  ];
  // ---------------------------------------------------------------------

  (function () {
    const list = document.getElementById("demoList");
    const preview = document.getElementById("preview");
    const faces = preview.querySelectorAll(".face");

    const mqReduce = window.matchMedia("(prefers-reduced-motion: reduce)");
    const hasGsap = typeof window.gsap !== "undefined";
    const reduced = () => mqReduce.matches || !hasGsap;

    // Build the list from config.
    demos.forEach((demo, i) => {
      const li = document.createElement("li");
      let el;
      if (demo.status === "live" && demo.url) {
        el = document.createElement("a");
        el.href = demo.url;
        el.target = "_blank";
        el.rel = "noopener";
      } else {
        el = document.createElement("span");
        el.tabIndex = 0;
      }
      el.className = "demo-item";
      el.textContent = demo.name;
      el.dataset.index = i;
      li.appendChild(el);
      list.appendChild(li);
    });

    // Placeholder: deterministic gradient per index, name in the corner.
    function buildContent(i) {
      const demo = demos[i];
      if (demo.image) {
        const img = document.createElement("img");
        img.src = demo.image;
        img.alt = "";
        return img;
      }
      const ph = document.createElement("div");
      ph.className = "ph";
      const angle = 115 + (i * 37) % 90;
      const rosePct = [0, 4, 8, 6][i % 4];
      const end = `color-mix(in srgb, var(--mist) ${100 - rosePct}%, var(--rose) ${rosePct}%)`;
      ph.style.background = `linear-gradient(${angle}deg, #FFFFFF 0%, ${end} 100%)`;
      const label = document.createElement("span");
      label.className = "ph-label";
      label.textContent = demo.name;
      ph.appendChild(label);
      return ph;
    }

    // ---- Cursor follow ------------------------------------------------
    let quickX, quickY;
    if (hasGsap) {
      quickX = gsap.quickTo(preview, "x", { duration: 0.55, ease: "power3" });
      quickY = gsap.quickTo(preview, "y", { duration: 0.55, ease: "power3" });
    }

    let mx = 0, my = 0;
    let visible = false;
    let currentIndex = -1;
    let front = 0;

    const clamp = (v, min, max) => Math.max(min, Math.min(v, max));

    function cursorTarget() {
      const w = preview.offsetWidth, h = preview.offsetHeight;
      let x = mx + 28;
      if (x + w > innerWidth - 16) x = mx - w - 28;
      return {
        x: clamp(x, 16, innerWidth - w - 16),
        y: clamp(my - h / 2, 16, innerHeight - h - 16),
      };
    }

    function itemTarget(item) {
      const w = preview.offsetWidth, h = preview.offsetHeight;
      const r = item.getBoundingClientRect();
      return {
        x: clamp(r.right + 24, 16, innerWidth - w - 16),
        y: clamp(r.top + r.height / 2 - h / 2, 16, innerHeight - h - 16),
      };
    }

    function snapTo(t) {
      if (hasGsap) {
        quickX(t.x);
        quickY(t.y);
        if (quickX.tween) quickX.tween.progress(1);
        if (quickY.tween) quickY.tween.progress(1);
      } else {
        preview.style.transform = `translate(${t.x}px, ${t.y}px)`;
      }
    }

    // ---- Show / swap / hide -------------------------------------------
    function showFor(item, docked) {
      const i = +item.dataset.index;
      if (i === currentIndex && visible) return;

      const wasVisible = visible;
      currentIndex = i;
      visible = true;

      const next = faces[1 - front];
      const prev = faces[front];
      next.replaceChildren(buildContent(i));
      front = 1 - front;

      if (reduced()) {
        next.style.opacity = 1;
        prev.style.opacity = 0;
        snapTo(itemTarget(item));
        preview.style.opacity = 1;
        preview.style.visibility = "visible";
        if (hasGsap) gsap.set(preview, { scale: 1 });
        return;
      }

      if (!wasVisible) {
        gsap.set(next, { opacity: 1 });
        gsap.set(prev, { opacity: 0 });
        snapTo(docked ? itemTarget(item) : cursorTarget());
        gsap.set(preview, { scale: 0.9 });
        gsap.to(preview, { autoAlpha: 1, scale: 1, duration: 0.35, ease: "power2.out", overwrite: "auto" });
      } else {
        gsap.set(next, { opacity: 0 });
        gsap.to(next, { opacity: 1, duration: 0.25, ease: "power1.out", overwrite: "auto" });
        gsap.to(prev, { opacity: 0, duration: 0.25, ease: "power1.out", overwrite: "auto" });
        gsap.fromTo(preview, { scale: 0.97 }, { scale: 1, duration: 0.3, ease: "power2.out", overwrite: "auto" });
        if (docked) snapTo(itemTarget(item));
      }
    }

    function hide() {
      if (!visible) return;
      visible = false;
      currentIndex = -1;
      if (reduced()) {
        preview.style.opacity = 0;
        preview.style.visibility = "hidden";
      } else {
        gsap.to(preview, { autoAlpha: 0, scale: 0.92, duration: 0.3, ease: "power2.out", overwrite: "auto" });
      }
    }

    // ---- Events -------------------------------------------------------
    list.addEventListener("mouseover", (e) => {
      const item = e.target.closest(".demo-item");
      if (!item) return;
      mx = e.clientX;
      my = e.clientY;
      showFor(item, reduced());
    });

    list.addEventListener("mousemove", (e) => {
      mx = e.clientX;
      my = e.clientY;
      if (!visible || reduced()) return;
      const t = cursorTarget();
      quickX(t.x);
      quickY(t.y);
    });

    list.addEventListener("mouseleave", hide);

    list.addEventListener("focusin", (e) => {
      const item = e.target.closest(".demo-item");
      if (!item || !item.matches(":focus-visible")) return;
      showFor(item, true);
    });

    list.addEventListener("focusout", (e) => {
      if (!list.contains(e.relatedTarget)) hide();
    });

    // Reset cleanly if the motion preference flips mid-session.
    mqReduce.addEventListener("change", () => {
      if (hasGsap) gsap.killTweensOf([preview, ...faces]);
      preview.style.opacity = 0;
      preview.style.visibility = "hidden";
      visible = false;
      currentIndex = -1;
    });
  })();
</script>
</body>
</html>
